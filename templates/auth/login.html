{% extends 'base.html' %}{% block content %}
<div class="row justify-content-center align-items-center" style="min-height:85vh"><div class="col-md-5 col-lg-4"><div class="card gf-card p-3"><div class="card-body"><h1 class="h3 fw-bold mb-3 text-center">Gestión Financiera</h1><form method="post">{{ form.hidden_tag() }}<label class="form-label gf-label">Email <small class="required">Obligatorio</small></label>{{ form.email(class='form-control form-control-lg', inputmode='email') }}<label class="form-label gf-label mt-3">Contraseña <small class="required">Obligatorio</small></label>{{ form.password(class='form-control form-control-lg') }}<button class="btn btn-primary btn-lg w-100 mt-4" type="submit">Ingresar</button></form></div></div></div></div>
{% endblock %}
