{% extends 'base.html' %}
{% block content %}
<h1 class="h3 fw-bold">Mis solicitudes</h1>
{% for s in solicitudes %}<div class="table-card"><div class="d-flex justify-content-between"><b>{{ s.monto_solicitado|money }}</b><span class="badge text-bg-info">{{ s.estado }}</span></div><p>{{ s.comentario_asistida or s.referencia or '-' }}</p><small>{{ s.fecha_solicitud }}</small></div>{% else %}<p class="text-muted">Sin solicitudes.</p>{% endfor %}
{% endblock %}
