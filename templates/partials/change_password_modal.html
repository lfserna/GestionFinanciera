{% if current_user.must_change_password %}
<div class="modal fade" id="changePasswordModal" tabindex="-1" data-force="1">
  <div class="modal-dialog modal-dialog-centered"><div class="modal-content gf-card"><div class="modal-header"><h5 class="modal-title">Cambia tu contraseña temporal</h5></div><form method="post" action="{{ url_for('auth.cambiar_password') }}"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><div class="modal-body"><p class="text-muted">No puedes usar el sistema hasta cambiar la contraseña temporal. La nueva contraseña no puede ser <b>hola123</b> y debe tener mínimo 8 caracteres.</p><label class="form-label gf-label">Nueva contraseña <small class="required">Obligatorio</small></label><input class="form-control form-control-lg" type="password" name="password" minlength="8" required><label class="form-label gf-label mt-3">Confirmar contraseña <small class="required">Obligatorio</small></label><input class="form-control form-control-lg" type="password" name="confirm" minlength="8" required></div><div class="modal-footer"><button class="btn btn-primary btn-lg w-100" type="submit">Cambiar contraseña</button></div></form></div></div>
</div>
{% endif %}
