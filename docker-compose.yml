services:
  web:
    build: .
    container_name: gestion_financiera_web
    command: python run.py
    env_file:
      - .env
    expose:
      - "5050"
    networks:
      - gestion_financiera_net
      - red_mysql_compartida
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: gestion_financiera_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
    networks:
      - gestion_financiera_net
    restart: unless-stopped

networks:
  gestion_financiera_net:
    driver: bridge

  red_mysql_compartida:
    external: true