services:
  db:
    image: mysql:8.0
    container_name: gestion_financiera_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: gestion_financiera
      MYSQL_ROOT_PASSWORD: root
      TZ: America/La_Paz
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-time-zone=-04:00

  web:
    build: .
    container_name: gestion_financiera_web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: db
      APP_HOST: 0.0.0.0
      APP_PORT: 5050
      TIMEZONE: America/La_Paz
    depends_on:
      - db
    volumes:
      - ./static/uploads:/app/static/uploads
    expose:
      - "5050"

  nginx:
    image: nginx:alpine
    container_name: gestion_financiera_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web

volumes:
  mysql_data:
